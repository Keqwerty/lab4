version: "3.9"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: is-mssql
    env_file: ".env"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - isnet
    restart: unless-stopped

  app:
    image: "${APP_IMAGE:-ghcr.io/keqwerty/lab4:latest}"
    # если нужен build вместо готового образа:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: is-app
    env_file: ".env"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      ConnectionStrings__Mssql: "BrokenConnectionString=True"
      App__Version: "${APP_VERSION}"
    depends_on:
      - mssql
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - isnet
    restart: unless-stopped

volumes:
  mssql_data:

networks:
  isnet:
    driver: bridge
