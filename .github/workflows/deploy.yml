name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: self-hosted

    steps:
      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.repository_owner }}" --password-stdin

      - name: Deploy with Docker Compose
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          docker compose pull
          docker compose up -d
